name: Build Executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mirofish-linux-x64
            binary: mirofish
            archive: mirofish-linux-x64.tar.gz
          - os: macos-latest
            artifact: mirofish-macos-x64
            binary: mirofish
            archive: mirofish-macos-x64.tar.gz
          - os: windows-latest
            artifact: mirofish-windows-x64
            binary: mirofish.exe
            archive: mirofish-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync
          uv pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          # Windows 使用分号作为 --add-data 分隔符，Linux/macOS 用冒号
          SEP=":"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then SEP=";"; fi

          cd backend
          uv run pyinstaller \
            --onefile \
            --name "${{ matrix.binary }}" \
            --add-data "../frontend/dist${SEP}frontend_dist" \
            --add-data "../static${SEP}static" \
            --add-data "../locales${SEP}locales" \
            --collect-all camel \
            --collect-all zep_cloud \
            --hidden-import flask \
            --hidden-import flask_cors \
            --hidden-import openai \
            --hidden-import pydantic \
            --hidden-import dotenv \
            --hidden-import charset_normalizer \
            --hidden-import chardet \
            production.py

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd backend/dist
          chmod +x "${{ matrix.binary }}"
          tar -czf "${{ matrix.archive }}" "${{ matrix.binary }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd backend/dist
          7z a "${{ matrix.archive }}" "${{ matrix.binary }}" > /dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: backend/dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
