name: Build Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        type: string
        default: "v0.1.0"

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mirofish-linux-x64
            archive: mirofish-linux-x64.tar.gz
          - os: macos-latest
            artifact: mirofish-macos-x64
            archive: mirofish-macos-x64.tar.gz
          - os: windows-latest
            artifact: mirofish-windows-x64
            archive: mirofish-windows-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          cd backend
          uv sync
          uv pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          SEP=":"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then SEP=";"; fi

          cd backend

          # 获取 venv site-packages 路径，确保 PyInstaller 能找到所有依赖
          SITE_PACKAGES=$(uv run python -c "import site; print(site.getsitepackages()[0])")
          echo "site-packages: $SITE_PACKAGES"

          uv run pyinstaller \
            --onedir \
            --noconfirm \
            --clean \
            --name mirofish \
            --paths "$SITE_PACKAGES" \
            --add-data "../frontend/dist${SEP}frontend_dist" \
            --add-data "../static${SEP}static" \
            --add-data "../locales${SEP}locales" \
            --collect-all flask \
            --collect-all werkzeug \
            --collect-all jinja2 \
            --collect-all camel \
            --collect-all zep_cloud \
            --hidden-import markupsafe \
            --hidden-import itsdangerous \
            --hidden-import blinker \
            --hidden-import click \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --exclude-module tensorflow \
            --exclude-module tensorboard \
            --exclude-module triton \
            --exclude-module nvidia \
            production.py

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd backend/dist/mirofish
          chmod +x mirofish
          cd ..
          tar -czf "${{ matrix.archive }}" mirofish

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd backend/dist
          7z a "${{ matrix.archive }}" mirofish > /dev/null
          # mirofish is a directory (--onedir output), contains mirofish.exe + _internal/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: backend/dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
